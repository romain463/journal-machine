<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Journal Metz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
<style>:root{--pr:#1D9E75;--prd:#0F6E56;--bg:#fff;--bg2:#f5f5f3;--bg3:#efefed;--tx:#1a1a18;--tx2:#6b6b65;--tx3:#9b9b95;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.25);--rm:8px;--rl:12px;--gs:#EAF3DE;--gt:#27500A;--ws:#FAEEDA;--wt:#633806;--ds:#FCEBEB;--dt:#791F1F;--is:#E6F1FB;--it:#0C447C}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--bg2:#262624;--bg3:#2e2e2c;--tx:#f0f0ec;--tx2:#a0a09a;--tx3:#68685e;--bd:rgba(255,255,255,0.1);--bd2:rgba(255,255,255,0.22);--gs:#173404;--gt:#C0DD97;--ws:#412402;--wt:#FAC775;--ds:#501313;--dt:#F09595;--is:#042C53;--it:#85B7EB}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--tx);min-height:100vh}
.pg{max-width:980px;margin:0 auto;padding:2rem 1rem}
.hd{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
.hi{width:48px;height:48px;background:var(--pr);border-radius:var(--rm);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.ab{display:inline-flex;align-items:center;gap:6px;background:var(--is);color:var(--it);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:4px}
.sb{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:4px;margin-left:8px}
.sb.on{background:var(--gs);color:var(--gt)}.sb.off{background:var(--ds);color:var(--dt)}
.st{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.sc{background:var(--bg);border-radius:var(--rm);padding:1rem;border:0.5px solid var(--bd)}
.sl{font-size:12px;color:var(--tx2);margin-bottom:4px}.sv{font-size:24px;font-weight:600}
.tb{display:flex;border:0.5px solid var(--bd);border-radius:var(--rm);overflow:hidden;margin-bottom:1.5rem;background:var(--bg)}
.tab{flex:1;padding:11px 8px;font-size:14px;background:transparent;color:var(--tx2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;transition:background .12s}
.tab.active{background:var(--bg2);color:var(--tx);font-weight:500}.tab:not(:last-child){border-right:0.5px solid var(--bd)}
.cd{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);margin-bottom:1.5rem;overflow:hidden}
.cb{padding:1.25rem}.ct{font-size:14px;font-weight:500;color:var(--tx2);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.f2{grid-column:1/-1}.fp{display:flex;flex-direction:column;gap:6px}
label{font-size:13px;color:var(--tx2);font-weight:500}
input,select{width:100%;padding:8px 12px;border:0.5px solid var(--bd);border-radius:var(--rm);font-size:14px;background:var(--bg);color:var(--tx);font-family:inherit;height:38px}
input:focus,select:focus{outline:none;border-color:var(--pr)}select:disabled{opacity:.75;cursor:not-allowed;background:var(--bg2)}
.br{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
.bn{padding:9px 18px;border-radius:var(--rm);font-size:14px;cursor:pointer;border:0.5px solid var(--bd2);background:var(--bg);color:var(--tx);font-family:inherit;display:inline-flex;align-items:center;gap:7px;transition:background .12s}
.bn:hover{background:var(--bg2)}.bn.p{background:var(--pr);color:#fff;border-color:var(--prd)}.bn.p:hover{background:var(--prd)}
.bn.d{color:var(--dt);border-color:var(--ds);background:var(--ds)}.bn.sm{padding:5px 10px;font-size:12px}.bn:disabled{opacity:.5;cursor:not-allowed}
.tr{display:flex;gap:8px;align-items:center;padding:1rem 1.25rem;border-bottom:0.5px solid var(--bd);flex-wrap:wrap}
.tr input,.tr select{height:34px;font-size:13px}.tr input{width:190px}.tr select{width:140px}.tr-r{margin-left:auto;display:flex;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:9px 10px;font-size:12px;font-weight:500;color:var(--tx2);border-bottom:0.5px solid var(--bd);background:var(--bg2)}
td{padding:9px 10px;border-bottom:0.5px solid var(--bd);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg2)}
.bg{font-size:11px;padding:3px 9px;border-radius:100px;display:inline-block;font-weight:500}
.bg-s{background:var(--gs);color:var(--gt)}.bg-w{background:var(--ws);color:var(--wt)}.bg-d{background:var(--ds);color:var(--dt)}.bg-i{background:var(--is);color:var(--it)}
.em{text-align:center;padding:3rem 1rem;color:var(--tx3);font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:var(--rm);font-size:13px;font-weight:500;display:none;z-index:999;color:#fff}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center}
.mo.open{display:flex}.md{background:var(--bg);border-radius:var(--rl);padding:1.75rem;width:100%;max-width:540px;border:0.5px solid var(--bd)}
.md h3{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.lo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;align-items:center;justify-content:center}
.lo.open{display:flex}.lb{background:var(--bg);border-radius:var(--rl);padding:2rem;text-align:center;font-size:14px;color:var(--tx2)}
.sp{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--pr);border-radius:50%;animation:rr .8s linear infinite;margin:0 auto 12px}
@keyframes rr{to{transform:rotate(360deg)}}
@media(max-width:600px){.st{grid-template-columns:repeat(2,1fr)}.fg{grid-template-columns:1fr}.f2{grid-column:1}.tr-r{margin-left:0;width:100%}}</style>
</head>
<body>
<div class="pg">
  <div class="hd">
    <div class="hi"><i class="ti ti-clipboard-list"></i></div>
    <div>
      <div style="font-size:20px;font-weight:600">Journal Machines — Magasin Central</div>
      <div style="display:flex;align-items:center;flex-wrap:wrap">
        <div class="ab"><i class="ti ti-building"></i> Metz</div>
        <span class="sb off" id="sb"><i class="ti ti-wifi-off"></i> Connexion...</span>
      </div>
    </div>
  </div>
  <div class="st">
    <div class="sc"><div class="sl">Total agence</div><div class="sv" id="st">—</div></div>
    <div class="sc"><div class="sl">Entrées</div><div class="sv" id="si">—</div></div>
    <div class="sc"><div class="sl">Sorties</div><div class="sv" id="so">—</div></div>
    <div class="sc"><div class="sl">Blocage QS</div><div class="sv" id="sq">—</div></div>
  </div>
  <div class="tb">
    <button class="tab active" onclick="switchTab('entree')" id="tentree"><i class="ti ti-login"></i> Entrée</button>
    <button class="tab" onclick="switchTab('sortie')" id="tsortie"><i class="ti ti-logout"></i> Sortie</button>
    <button class="tab" onclick="switchTab('journal')" id="tjournal"><i class="ti ti-table"></i> Mon journal</button>
  </div>
  <div id="ventree">
    <div class="cd"><div class="cb">
      <div class="ct"><i class="ti ti-login"></i> Enregistrement d&rsquo;entrée</div>
      <div class="fg">
        <div class="fp"><label>N&deg; Asset tag *</label><input type="text" id="ia" placeholder="ex. AT-00123"/></div>
        <div class="fp"><label>Date d&rsquo;entrée *</label><input type="date" id="id"/></div>
        <div class="fp"><label>Agence de saisie (verrouillée)</label><select id="isa" disabled><option value="Magasin Central">Magasin Central</option><option value="Strasbourg">Strasbourg</option><option value="Caen">Caen</option><option value="Metz" selected>Metz</option><option value="Bordeaux">Bordeaux</option><option value="Paris Nord">Paris Nord</option><option value="Paris Ouest">Paris Ouest</option><option value="Paris Sud">Paris Sud</option><option value="Dijon">Dijon</option><option value="Lille">Lille</option><option value="Rouen">Rouen</option><option value="Reims">Reims</option><option value="Troyes">Troyes</option><option value="Lyon">Lyon</option><option value="Annecy">Annecy</option><option value="Nice">Nice</option><option value="Montpellier">Montpellier</option><option value="Marseille">Marseille</option><option value="Toulouse">Toulouse</option><option value="Pau">Pau</option><option value="Angers">Angers</option><option value="Vierzon">Vierzon</option><option value="Clermont">Clermont</option><option value="Quimper">Quimper</option></select></div>
        <div class="fp"><label>Agence de provenance *</label><input type="text" id="iag" placeholder="ex. Agence Nord"/></div>
        <div class="fp"><label>Blocage QS</label><select id="iqs"><option value="">— Sélectionner —</option><option>Oui</option><option>Non</option></select></div>
        <div class="fp f2"><label>Remarque</label><input type="text" id="in" placeholder="Optionnel"/></div>
      </div>
      <div class="br">
        <button class="bn" onclick="clearForm('i')"><i class="ti ti-x"></i> Effacer</button>
        <button class="bn p" id="bin" onclick="saveEntree()"><i class="ti ti-check"></i> Enregistrer l&rsquo;entrée</button>
      </div>
    </div></div>
  </div>
  <div id="vsortie" style="display:none">
    <div class="cd"><div class="cb">
      <div class="ct"><i class="ti ti-logout"></i> Enregistrement de sortie</div>
      <div class="fg">
        <div class="fp"><label>N&deg; Asset tag *</label><input type="text" id="oa" placeholder="ex. AT-00123"/></div>
        <div class="fp"><label>Date de sortie *</label><input type="date" id="od"/></div>
        <div class="fp"><label>Agence de saisie (verrouillée)</label><select id="osa" disabled><option value="Magasin Central">Magasin Central</option><option value="Strasbourg">Strasbourg</option><option value="Caen">Caen</option><option value="Metz" selected>Metz</option><option value="Bordeaux">Bordeaux</option><option value="Paris Nord">Paris Nord</option><option value="Paris Ouest">Paris Ouest</option><option value="Paris Sud">Paris Sud</option><option value="Dijon">Dijon</option><option value="Lille">Lille</option><option value="Rouen">Rouen</option><option value="Reims">Reims</option><option value="Troyes">Troyes</option><option value="Lyon">Lyon</option><option value="Annecy">Annecy</option><option value="Nice">Nice</option><option value="Montpellier">Montpellier</option><option value="Marseille">Marseille</option><option value="Toulouse">Toulouse</option><option value="Pau">Pau</option><option value="Angers">Angers</option><option value="Vierzon">Vierzon</option><option value="Clermont">Clermont</option><option value="Quimper">Quimper</option></select></div>
        <div class="fp"><label>Agence de provenance</label><input type="text" id="oag" placeholder="Optionnel"/></div>
        <div class="fp"><label>Blocage QS</label><select id="oqs"><option value="">— Sélectionner —</option><option>Oui</option><option>Non</option></select></div>
        <div class="fp"><label>Destination *</label><select id="odst"><option value="">— Sélectionner —</option><option>Soverp</option><option>Dinington</option><option>Maintenance</option></select></div>
        <div class="fp f2"><label>Remarque</label><input type="text" id="on" placeholder="Optionnel"/></div>
      </div>
      <div class="br">
        <button class="bn" onclick="clearForm('o')"><i class="ti ti-x"></i> Effacer</button>
        <button class="bn p" id="bout" onclick="saveSortie()"><i class="ti ti-check"></i> Enregistrer la sortie</button>
      </div>
    </div></div>
  </div>
  <div id="vjournal" style="display:none">
    <div class="cd">
      <div class="tr">
        <input type="text" id="fs" placeholder="Rechercher..." oninput="render()"/>
        <select id="ft" onchange="render()"><option value="">Tous types</option><option>Entrée</option><option>Sortie</option></select>
        <div class="tr-r"><button class="bn sm" onclick="exportCSV()"><i class="ti ti-download"></i> Export CSV</button></div>
      </div>
      <div style="overflow-x:auto"><table>
        <thead><tr>
          <th style="width:105px">Asset tag</th><th style="width:70px">Type</th><th style="width:95px">Date</th>
          <th style="width:125px">Provenance</th><th style="width:78px">Bloc.QS</th>
          <th style="width:105px">Destination</th><th>Remarque</th><th style="width:82px">Actions</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table></div>
    </div>
  </div>
</div>
<div class="mo" id="mo">
  <div class="md">
    <h3 id="mtt">Modifier</h3>
    <div class="fg">
      <div class="fp"><label>N&deg; Asset tag</label><input type="text" id="ma"/></div>
      <div class="fp"><label>Date</label><input type="date" id="md"/></div>
      <div class="fp"><label>Agence provenance</label><input type="text" id="mag"/></div>
      <div class="fp"><label>Blocage QS</label><select id="mqs"><option value="">—</option><option>Oui</option><option>Non</option></select></div>
      <div class="fp"><label>Destination</label><select id="mds"><option value="">—</option><option>Soverp</option><option>Dinington</option><option>Maintenance</option></select></div>
      <div class="fp f2"><label>Remarque</label><input type="text" id="mn"/></div>
    </div>
    <div class="br" style="margin-top:1.25rem">
      <button class="bn" onclick="closeModal()"><i class="ti ti-x"></i> Annuler</button>
      <button class="bn p" onclick="saveEdit()"><i class="ti ti-check"></i> Sauvegarder</button>
    </div>
  </div>
</div>
<div class="lo" id="lo"><div class="lb"><div class="sp"></div>Enregistrement...</div></div>
<div class="toast" id="toast"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const fb = initializeApp({
  apiKey: "AIzaSyDv53luEaoSaX1fTCVCy1OVD7pIqkRlYEQ",
  authDomain: "journal-machines.firebaseapp.com",
  projectId: "journal-machines",
  storageBucket: "journal-machines.firebasestorage.app",
  messagingSenderId: "1038248860133",
  appId: "1:1038248860133:web:f3089ef9141e2db3d9370c"
});
const db = getFirestore(fb);
const AG = "Metz";
const COL = "mouvements";
const ref = collection(db, COL);
const qu = query(ref, orderBy("createdAt","desc"));
let recs = []; let eid = null;
const sb = document.getElementById("sb");
onSnapshot(qu, sn => {
  recs = sn.docs.map(d => ({_id:d.id,...d.data()})).filter(r => r.saisie === AG);
  stats(); render();
  sb.className = "sb on";
  sb.innerHTML = '<i class="ti ti-wifi"></i> Synchronisé';
}, () => {
  sb.className = "sb off";
  sb.innerHTML = '<i class="ti ti-wifi-off"></i> Hors ligne';
});
function today() { return new Date().toISOString().split("T")[0]; }
function toast(m, e) {
  const t = document.getElementById("toast");
  t.textContent = m; t.style.background = e ? "#A32D2D" : "#1D9E75";
  t.style.display = "block"; setTimeout(() => t.style.display = "none", 2500);
}
function load(on) { document.getElementById("lo").classList.toggle("open", on); }
function stats() {
  document.getElementById("st").textContent = recs.length;
  document.getElementById("si").textContent = recs.filter(r => r.type === "Entrée").length;
  document.getElementById("so").textContent = recs.filter(r => r.type === "Sortie").length;
  document.getElementById("sq").textContent = recs.filter(r => r.qs === "Oui").length;
}
function switchTab(t) {
  ["entree","sortie","journal"].forEach(v => {
    document.getElementById("v"+v).style.display = v === t ? "block" : "none";
    document.getElementById("t"+v).classList.toggle("active", v === t);
  });
  if (t === "journal") render();
}
async function saveEntree() {
  const asset = document.getElementById("ia").value.trim();
  const date = document.getElementById("id").value;
  const agence = document.getElementById("iag").value.trim();
  if (!asset || !date || !agence) { toast("Champs obligatoires manquants", true); return; }
  const btn = document.getElementById("bin"); btn.disabled = true; load(true);
  try {
    await addDoc(ref, { type:"Entrée", asset, date, saisie:AG, agence,
      qs: document.getElementById("iqs").value,
      dest: "—", note: document.getElementById("in").value.trim(),
      createdAt: serverTimestamp() });
    clearForm("i"); toast("Entrée enregistrée ✓");
  } catch(e) { toast("Erreur: " + e.message, true); }
  finally { btn.disabled = false; load(false); }
}
async function saveSortie() {
  const asset = document.getElementById("oa").value.trim();
  const date = document.getElementById("od").value;
  const dest = document.getElementById("odst").value;
  if (!asset || !date || !dest) { toast("Champs obligatoires manquants", true); return; }
  const btn = document.getElementById("bout"); btn.disabled = true; load(true);
  try {
    await addDoc(ref, { type:"Sortie", asset, date, saisie:AG,
      agence: document.getElementById("oag").value.trim() || "—",
      qs: document.getElementById("oqs").value, dest,
      note: document.getElementById("on").value.trim(),
      createdAt: serverTimestamp() });
    clearForm("o"); toast("Sortie enregistrée ✓");
  } catch(e) { toast("Erreur: " + e.message, true); }
  finally { btn.disabled = false; load(false); }
}
function clearForm(p) {
  if (p === "i") {
    ["ia","iag","in"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("iqs").value = "";
    document.getElementById("id").value = today();
  } else {
    ["oa","oag","on"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("oqs").value = "";
    document.getElementById("odst").value = "";
    document.getElementById("od").value = today();
  }
}
function filtered() {
  const q2 = (document.getElementById("fs").value || "").toLowerCase();
  const ft = document.getElementById("ft").value || "";
  return recs.filter(r => {
    const mq = !q2 || Object.values(r).some(v => String(v).toLowerCase().includes(q2));
    return mq && (!ft || r.type === ft);
  });
}
function render() {
  const f = filtered();
  const tb = document.getElementById("tbody");
  if (!f.length) {
    tb.innerHTML = '<tr><td colspan="8"><div class="em"><i class="ti ti-inbox" style="font-size:28px;display:block;margin-bottom:8px"></i>Aucun enregistrement</div></td></tr>';
    return;
  }
  tb.innerHTML = f.map(r => {
    const qs = r.qs ? '<span class="bg ' + (r.qs === "Oui" ? "bg-d" : "") + '">' + r.qs + '</span>' : "—";
    const dst = (r.dest && r.dest !== "—") ? '<span class="bg bg-i">' + r.dest + '</span>' : "—";
    return '<tr>'
      + '<td style="font-weight:500">' + r.asset + '</td>'
      + '<td><span class="bg ' + (r.type === "Entrée" ? "bg-s" : "bg-w") + '">' + r.type + '</span></td>'
      + '<td>' + r.date + '</td>'
      + '<td>' + (r.agence || "—") + '</td>'
      + '<td>' + qs + '</td>'
      + '<td>' + dst + '</td>'
      + '<td style="color:var(--tx2)">' + (r.note || "—") + '</td>'
      + '<td style="white-space:nowrap">'
      + '<button class="bn sm be" data-id="' + r._id + '" title="Modifier"><i class="ti ti-edit"></i></button>'
      + '<button class="bn sm d bd" data-id="' + r._id + '" title="Supprimer" style="margin-left:4px"><i class="ti ti-trash"></i></button>'
      + '</td></tr>';
  }).join("");
  document.querySelectorAll(".be").forEach(b => b.onclick = () => edit(b.dataset.id));
  document.querySelectorAll(".bd").forEach(b => b.onclick = () => del(b.dataset.id));
}
function edit(id) {
  eid = id; const r = recs.find(x => x._id === id); if (!r) return;
  document.getElementById("ma").value = r.asset || "";
  document.getElementById("md").value = r.date || "";
  document.getElementById("mag").value = r.agence === "—" ? "" : (r.agence || "");
  document.getElementById("mqs").value = r.qs || "";
  document.getElementById("mds").value = r.dest === "—" ? "" : (r.dest || "");
  document.getElementById("mn").value = r.note || "";
  document.getElementById("mtt").textContent = "Modifier — " + r.asset;
  document.getElementById("mo").classList.add("open");
}
function closeModal() { document.getElementById("mo").classList.remove("open"); eid = null; }
async function saveEdit() {
  if (!eid) return; load(true);
  try {
    await updateDoc(doc(db, COL, eid), {
      asset: document.getElementById("ma").value.trim(),
      date: document.getElementById("md").value,
      agence: document.getElementById("mag").value.trim() || "—",
      qs: document.getElementById("mqs").value,
      dest: document.getElementById("mds").value || "—",
      note: document.getElementById("mn").value.trim()
    });
    closeModal(); toast("Modifié ✓");
  } catch(e) { toast("Erreur: " + e.message, true); }
  finally { load(false); }
}
async function del(id) {
  const r = recs.find(x => x._id === id); if (!r) return;
  if (!confirm("Supprimer " + r.asset + " ?")) return;
  load(true);
  try { await deleteDoc(doc(db, COL, id)); toast("Supprimé"); }
  catch(e) { toast("Erreur: " + e.message, true); }
  finally { load(false); }
}
function exportCSV() {
  const f = filtered();
  if (!f.length) { toast("Aucune donnée", true); return; }
  const h = ["Asset tag","Type","Date","Agence provenance","Blocage QS","Destination","Remarque"];
  const rows = f.map(r => [r.asset,r.type,r.date,r.agence,r.qs||"",r.dest,r.note]
    .map(v => '"' + String(v||"").replace(/"/g,'""') + '"').join(","));
  const csv = "﻿" + [h.join(","),...rows].join("
");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "journal_metz_" + today() + ".csv";
