<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Journal Machines — Bordeaux</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
<style>
:root{
  --primary:#1D9E75;--primary-dark:#0F6E56;
  --bg:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#efefed;
  --text:#1a1a18;--text-secondary:#6b6b65;--text-tertiary:#9b9b95;
  --border:rgba(0,0,0,0.12);--border-hover:rgba(0,0,0,0.25);
  --radius-md:8px;--radius-lg:12px;
  --success-bg:#EAF3DE;--success-text:#27500A;
  --warning-bg:#FAEEDA;--warning-text:#633806;
  --danger-bg:#FCEBEB;--danger-text:#791F1F;
  --info-bg:#E6F1FB;--info-text:#0C447C;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg-secondary:#262624;--bg-tertiary:#2e2e2c;
    --text:#f0f0ec;--text-secondary:#a0a09a;--text-tertiary:#68685e;
    --border:rgba(255,255,255,0.1);--border-hover:rgba(255,255,255,0.22);
    --success-bg:#173404;--success-text:#C0DD97;
    --warning-bg:#412402;--warning-text:#FAC775;
    --danger-bg:#501313;--danger-text:#F09595;
    --info-bg:#042C53;--info-text:#85B7EB;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text);min-height:100vh}
.page{max-width:980px;margin:0 auto;padding:2rem 1rem}
.header{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
.header-icon{width:48px;height:48px;background:var(--primary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.header h1{font-size:20px;font-weight:600}
.agence-badge{display:inline-flex;align-items:center;gap:6px;background:var(--info-bg);color:var(--info-text);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:4px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--bg);border-radius:var(--radius-md);padding:1rem;border:0.5px solid var(--border)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:1.5rem;background:var(--bg)}
.tab{flex:1;padding:11px 8px;font-size:14px;background:transparent;color:var(--text-secondary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.12s;font-family:inherit}
.tab.active{background:var(--bg-secondary);color:var(--text);font-weight:500}
.tab:not(:last-child){border-right:0.5px solid var(--border)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
.card-body{padding:1.25rem}
.section-title{font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;color:var(--text-secondary);font-weight:500}
input,select{width:100%;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;height:38px;transition:border-color 0.12s}
input:focus,select:focus{outline:none;border-color:var(--primary)}
select:disabled{opacity:0.75;cursor:not-allowed;background:var(--bg-secondary)}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
.btn{padding:9px 18px;border-radius:var(--radius-md);font-size:14px;cursor:pointer;border:0.5px solid var(--border-hover);background:var(--bg);color:var(--text);font-family:inherit;display:inline-flex;align-items:center;gap:7px;transition:background 0.12s}
.btn:hover{background:var(--bg-secondary)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
.btn.primary:hover{background:var(--primary-dark)}
.btn.danger-outline{color:var(--danger-text);border-color:var(--danger-bg);background:var(--danger-bg)}
.btn.danger-outline:hover{opacity:0.85}
.btn.sm{padding:5px 10px;font-size:12px}
.toolbar{display:flex;gap:8px;align-items:center;padding:1rem 1.25rem;border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.toolbar input,.toolbar select{height:34px;font-size:13px}
.toolbar input{width:190px}
.toolbar select{width:140px}
.toolbar-right{margin-left:auto;display:flex;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:9px 10px;font-size:12px;font-weight:500;color:var(--text-secondary);border-bottom:0.5px solid var(--border);background:var(--bg-secondary)}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-secondary)}
.badge{font-size:11px;padding:3px 9px;border-radius:100px;display:inline-block;font-weight:500}
.badge.success{background:var(--success-bg);color:var(--success-text)}
.badge.warning{background:var(--warning-bg);color:var(--warning-text)}
.badge.danger{background:var(--danger-bg);color:var(--danger-text)}
.badge.info{background:var(--info-bg);color:var(--info-text)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-tertiary);font-size:14px}
.empty-state i{font-size:32px;display:block;margin-bottom:10px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;display:none;z-index:999;color:#fff}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:1.75rem;width:100%;max-width:540px;border:0.5px solid var(--border)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1.25rem}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .toolbar-right{margin-left:0;width:100%}
}
</style>
</head>

<script>
const STORE_KEY='journal_v1_bordeaux';
const AGENCE_NAME='Bordeaux';
let records=[];let editIdx=null;
function load(){try{const d=localStorage.getItem(STORE_KEY);if(d)records=JSON.parse(d);}catch(e){records=[];}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(records));}catch(e){}}
function today(){return new Date().toISOString().split('T')[0];}
function toast(msg,err){const el=document.getElementById('toast');el.textContent=msg;el.style.background=err?'#A32D2D':'#1D9E75';el.style.display='block';setTimeout(()=>el.style.display='none',2500);}
function updateStats(){
  document.getElementById('s-total').textContent=records.length;
  document.getElementById('s-in').textContent=records.filter(r=>r.type==='Entrée').length;
  document.getElementById('s-out').textContent=records.filter(r=>r.type==='Sortie').length;
  document.getElementById('s-qs').textContent=records.filter(r=>r.qs==='Oui').length;
}
function switchTab(t){
  ['entree','sortie','journal'].forEach(v=>{
    document.getElementById('view-'+v).style.display=v===t?'block':'none';
    document.getElementById('tab-'+v).classList.toggle('active',v===t);
  });
  if(t==='journal')renderTable();
}
function saveEntree(){
  const asset=document.getElementById('in-asset').value.trim();
  const date=document.getElementById('in-date').value;
  const agence=document.getElementById('in-agence').value.trim();
  if(!asset||!date||!agence){toast('Veuillez remplir les champs obligatoires (*)',true);return;}
  records.unshift({id:Date.now(),type:'Entrée',asset,date,saisie:AGENCE_NAME,agence,qs:document.getElementById('in-qs').value,dest:'—',note:document.getElementById('in-note').value.trim()});
  save();updateStats();clearForm('in');toast('Entrée enregistrée avec succès');
}
function saveSortie(){
  const asset=document.getElementById('out-asset').value.trim();
  const date=document.getElementById('out-date').value;
  const dest=document.getElementById('out-dest').value;
  if(!asset||!date||!dest){toast('Veuillez remplir les champs obligatoires (*)',true);return;}
  records.unshift({id:Date.now(),type:'Sortie',asset,date,saisie:AGENCE_NAME,agence:document.getElementById('out-agence').value.trim()||'—',qs:document.getElementById('out-qs').value,dest,note:document.getElementById('out-note').value.trim()});
  save();updateStats();clearForm('out');toast('Sortie enregistrée avec succès');
}
function clearForm(p){
  ['asset','agence','note'].forEach(f=>{const el=document.getElementById(p+'-'+f);if(el)el.value='';});
  document.getElementById(p+'-qs').value='';
  if(p==='out')document.getElementById('out-dest').value='';
  document.getElementById(p+'-date').value=today();
}
function getFiltered(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const ft=document.getElementById('filter-type').value||'';
  return records.filter(r=>{
    const mq=!q||Object.values(r).some(v=>String(v).toLowerCase().includes(q));
    const mt=!ft||r.type===ft;
    return mq&&mt;
  });
}
function renderTable(){
  const filtered=getFiltered();
  const tbody=document.getElementById('table-body');
  if(!filtered.length){tbody.innerHTML='<tr><td colspan="9"><div class="empty-state"><i class="ti ti-inbox"></i>Aucun enregistrement</div></td></tr>';return;}
  tbody.innerHTML=filtered.map(r=>{
    const ri=records.indexOf(r);
    return `<tr>
      <td style="font-weight:500">${r.asset}</td>
      <td><span class="badge ${r.type==='Entrée'?'success':'warning'}">${r.type}</span></td>
      <td>${r.date}</td>
      <td><span class="badge info">${r.saisie||'—'}</span></td>
      <td>${r.agence}</td>
      <td>${r.qs?`<span class="badge ${r.qs==='Oui'?'danger':''}">${r.qs}</span>`:'—'}</td>
      <td>${r.dest!=='—'?`<span class="badge info">${r.dest}</span>`:'—'}</td>
      <td style="color:var(--text-secondary)">${r.note||'—'}</td>
      <td style="white-space:nowrap">
        <button class="btn sm" onclick="openEdit(${ri})" title="Modifier"><i class="ti ti-edit"></i></button>
        <button class="btn sm danger-outline" onclick="deleteRec(${ri})" title="Supprimer" style="margin-left:4px"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join('');
}
function openEdit(idx){
  editIdx=idx;const r=records[idx];
  document.getElementById('m-asset').value=r.asset;
  document.getElementById('m-date').value=r.date;
  document.getElementById('m-saisie').value=r.saisie||AGENCE_NAME;
  document.getElementById('m-agence').value=r.agence==='—'?'':r.agence;
  document.getElementById('m-qs').value=r.qs||'';
  document.getElementById('m-dest').value=r.dest==='—'?'':r.dest;
  document.getElementById('m-note').value=r.note||'';
  document.getElementById('modal-title').textContent='Modifier — '+r.asset+' ('+r.type+')';
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal(){document.getElementById('edit-modal').classList.remove('open');editIdx=null;}
function saveEdit(){
  if(editIdx===null)return;
  const r=records[editIdx];
  r.asset=document.getElementById('m-asset').value.trim()||r.asset;
  r.date=document.getElementById('m-date').value||r.date;
  r.saisie=document.getElementById('m-saisie').value||r.saisie;
  r.agence=document.getElementById('m-agence').value.trim()||'—';
  r.qs=document.getElementById('m-qs').value;
  r.dest=document.getElementById('m-dest').value||'—';
  r.note=document.getElementById('m-note').value.trim();
  save();updateStats();closeModal();renderTable();toast('Enregistrement modifié');
}
document.getElementById('edit-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
function deleteRec(idx){
  const r=records[idx];
  if(!confirm('Supprimer '+r.asset+' ('+r.type+' — '+r.date+') ?'))return;
  records.splice(idx,1);save();updateStats();renderTable();toast('Enregistrement supprimé');
}
function confirmClear(){
  if(!records.length){toast('Le journal est déjà vide',true);return;}
  if(!confirm('Vider tout le journal ('+records.length+' enregistrements) ? Action irréversible.'))return;
  records=[];save();updateStats();renderTable();toast('Journal vidé');
}
function exportCSV(){
  const filtered=getFiltered();
  if(!filtered.length){toast('Aucune donnée à exporter',true);return;}
  const header=['Asset tag','Type','Date','Agence saisie','Agence provenance','Blocage QS','Destination','Remarque'];
  const rows=filtered.map(r=>[r.asset,r.type,r.date,r.saisie||'',r.agence,r.qs||'',r.dest,r.note].map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[header.join(','),...rows].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='journal_bordeaux_'+today()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export CSV téléchargé ('+filtered.length+' lignes)');
}
load();
document.getElementById('in-date').value=today();
document.getElementById('out-date').value=today();
updateStats();
</script>
