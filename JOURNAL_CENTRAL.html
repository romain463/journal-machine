<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Journal Central — Toutes Agences</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css"/>
<style>

:root{
  --primary:#1D9E75;--primary-dark:#0F6E56;
  --bg:#ffffff;--bg-secondary:#f5f5f3;--bg-tertiary:#efefed;
  --text:#1a1a18;--text-secondary:#6b6b65;--text-tertiary:#9b9b95;
  --border:rgba(0,0,0,0.12);--border-hover:rgba(0,0,0,0.25);
  --radius-md:8px;--radius-lg:12px;
  --success-bg:#EAF3DE;--success-text:#27500A;
  --warning-bg:#FAEEDA;--warning-text:#633806;
  --danger-bg:#FCEBEB;--danger-text:#791F1F;
  --info-bg:#E6F1FB;--info-text:#0C447C;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg-secondary:#262624;--bg-tertiary:#2e2e2c;
    --text:#f0f0ec;--text-secondary:#a0a09a;--text-tertiary:#68685e;
    --border:rgba(255,255,255,0.1);--border-hover:rgba(255,255,255,0.22);
    --success-bg:#173404;--success-text:#C0DD97;
    --warning-bg:#412402;--warning-text:#FAC775;
    --danger-bg:#501313;--danger-text:#F09595;
    --info-bg:#042C53;--info-text:#85B7EB;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text);min-height:100vh}
.page{max-width:980px;margin:0 auto;padding:2rem 1rem}
.header{display:flex;align-items:center;gap:14px;margin-bottom:2rem}
.header-icon{width:48px;height:48px;background:var(--primary);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff}
.agence-badge{display:inline-flex;align-items:center;gap:6px;background:var(--info-bg);color:var(--info-text);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:4px}
.sync-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-top:4px;margin-left:8px}
.sync-badge.online{background:#EAF3DE;color:#27500A}
.sync-badge.offline{background:#FCEBEB;color:#791F1F}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat-card{background:var(--bg);border-radius:var(--radius-md);padding:1rem;border:0.5px solid var(--border)}
.stat-label{font-size:12px;color:var(--text-secondary);margin-bottom:4px}
.stat-val{font-size:24px;font-weight:600}
.tabs{display:flex;border:0.5px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-bottom:1.5rem;background:var(--bg)}
.tab{flex:1;padding:11px 8px;font-size:14px;background:transparent;color:var(--text-secondary);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background 0.12s;font-family:inherit}
.tab.active{background:var(--bg-secondary);color:var(--text);font-weight:500}
.tab:not(:last-child){border-right:0.5px solid var(--border)}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden}
.card-body{padding:1.25rem}
.section-title{font-size:14px;font-weight:500;color:var(--text-secondary);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group.full{grid-column:1/-1}
label{font-size:13px;color:var(--text-secondary);font-weight:500}
input,select{width:100%;padding:8px 12px;border:0.5px solid var(--border);border-radius:var(--radius-md);font-size:14px;background:var(--bg);color:var(--text);font-family:inherit;height:38px;transition:border-color 0.12s}
input:focus,select:focus{outline:none;border-color:var(--primary)}
select:disabled{opacity:0.75;cursor:not-allowed;background:var(--bg-secondary)}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1.25rem}
.btn{padding:9px 18px;border-radius:var(--radius-md);font-size:14px;cursor:pointer;border:0.5px solid var(--border-hover);background:var(--bg);color:var(--text);font-family:inherit;display:inline-flex;align-items:center;gap:7px;transition:background 0.12s}
.btn:hover{background:var(--bg-secondary)}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
.btn.primary:hover{background:var(--primary-dark)}
.btn.danger-outline{color:var(--danger-text);border-color:var(--danger-bg);background:var(--danger-bg)}
.btn.danger-outline:hover{opacity:0.85}
.btn.sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.toolbar{display:flex;gap:8px;align-items:center;padding:1rem 1.25rem;border-bottom:0.5px solid var(--border);flex-wrap:wrap}
.toolbar input,.toolbar select{height:34px;font-size:13px}
.toolbar input{width:190px}
.toolbar select{width:140px}
.toolbar-right{margin-left:auto;display:flex;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:9px 10px;font-size:12px;font-weight:500;color:var(--text-secondary);border-bottom:0.5px solid var(--border);background:var(--bg-secondary)}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg-secondary)}
.badge{font-size:11px;padding:3px 9px;border-radius:100px;display:inline-block;font-weight:500}
.badge.success{background:var(--success-bg);color:var(--success-text)}
.badge.warning{background:var(--warning-bg);color:var(--warning-text)}
.badge.danger{background:var(--danger-bg);color:var(--danger-text)}
.badge.info{background:var(--info-bg);color:var(--info-text)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--text-tertiary);font-size:14px}
.empty-state i{font-size:32px;display:block;margin-bottom:10px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 20px;border-radius:var(--radius-md);font-size:13px;font-weight:500;display:none;z-index:999;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.18)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);padding:1.75rem;width:100%;max-width:540px;border:0.5px solid var(--border)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:1.25rem}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:200;align-items:center;justify-content:center}
.loading-overlay.open{display:flex}
.loading-box{background:var(--bg);border-radius:var(--radius-lg);padding:2rem;text-align:center;font-size:14px;color:var(--text-secondary)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .form-group.full{grid-column:1}
  .toolbar-right{margin-left:0;width:100%}
}

.header-icon{background:#534AB7 !important}
.sync-badge.online{background:#EAF3DE;color:#27500A}
.sync-badge.offline{background:#FCEBEB;color:#791F1F}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="header-icon"><i class="ti ti-building-skyscraper"></i></div>
    <div>
      <div style="font-size:20px;font-weight:600">Journal Central — Vue consolidée</div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:4px">
        <span style="font-size:13px;color:var(--text-secondary)">Toutes agences — synchronisation temps réel</span>
        <span class="sync-badge offline" id="sync-badge"><i class="ti ti-wifi-off"></i> Connexion...</span>
      </div>
    </div>
  </div>

  <div class="stats-row" style="grid-template-columns:repeat(5,1fr)">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat-card"><div class="stat-label">Entrées</div><div class="stat-val" id="s-in">—</div></div>
    <div class="stat-card"><div class="stat-label">Sorties</div><div class="stat-val" id="s-out">—</div></div>
    <div class="stat-card"><div class="stat-label">Blocage QS</div><div class="stat-val" id="s-qs">—</div></div>
    <div class="stat-card"><div class="stat-label">Agences actives</div><div class="stat-val" id="s-agences">—</div></div>
  </div>

  <div class="card">
    <div class="toolbar">
      <input type="text" id="search" placeholder="Rechercher..." oninput="renderTable()"/>
      <select id="filter-type" onchange="renderTable()">
        <option value="">Tous types</option><option>Entrée</option><option>Sortie</option>
      </select>
      <select id="filter-agence" onchange="renderTable()">
        <option value="">Toutes agences</option>
      </select>
      <select id="filter-dest" onchange="renderTable()" style="width:140px">
        <option value="">Toutes destinations</option>
        <option>Soverp</option><option>Dinington</option><option>Maintenance</option>
      </select>
      <div class="toolbar-right">
        <button class="btn sm" onclick="exportCSV()"><i class="ti ti-download"></i> Export global CSV</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th style="width:105px;cursor:pointer" onclick="sortBy('asset')">Asset tag ↕</th>
          <th style="width:70px;cursor:pointer" onclick="sortBy('type')">Type</th>
          <th style="width:95px;cursor:pointer" onclick="sortBy('date')">Date ↕</th>
          <th style="width:120px;cursor:pointer" onclick="sortBy('saisie')">Agence saisie ↕</th>
          <th style="width:115px">Provenance</th>
          <th style="width:75px">Bloc. QS</th>
          <th style="width:105px;cursor:pointer" onclick="sortBy('dest')">Destination</th>
          <th>Remarque</th>
        </tr></thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, orderBy }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey: "AIzaSyDv53luEaoSaX1fTCVCy1OVD7pIqkRlYEQ",
  authDomain: "journal-machines.firebaseapp.com",
  projectId: "journal-machines",
  storageBucket: "journal-machines.firebasestorage.app",
  messagingSenderId: "1038248860133",
  appId: "1:1038248860133:web:f3089ef9141e2db3d9370c"};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const colRef = collection(db, "mouvements");
const q = query(colRef, orderBy("createdAt","desc"));

let allRecords = [];
let sortCol = 'date'; let sortAsc = false;

const syncBadge = document.getElementById('sync-badge');
onSnapshot(q, (snap) => {
  allRecords = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
  updateAll();
  syncBadge.className = 'sync-badge online';
  syncBadge.innerHTML = '<i class="ti ti-wifi"></i> Synchronisé — ' + allRecords.length + ' enregistrements';
}, () => {
  syncBadge.className = 'sync-badge offline';
  syncBadge.innerHTML = '<i class="ti ti-wifi-off"></i> Hors ligne';
});

function updateAll() {
  document.getElementById('s-total').textContent = allRecords.length;
  document.getElementById('s-in').textContent = allRecords.filter(r=>r.type==='Entrée').length;
  document.getElementById('s-out').textContent = allRecords.filter(r=>r.type==='Sortie').length;
  document.getElementById('s-qs').textContent = allRecords.filter(r=>r.qs==='Oui').length;
  const ags = [...new Set(allRecords.map(r=>r.saisie).filter(Boolean))];
  document.getElementById('s-agences').textContent = ags.length;
  updateAgenceFilter();
  renderTable();
}

function updateAgenceFilter() {
  const sel = document.getElementById('filter-agence');
  const cur = sel.value;
  const ags = [...new Set(allRecords.map(r=>r.saisie).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">Toutes agences</option>' + ags.map(a=>`<option value="${a}"${a===cur?' selected':''}>${a}</option>`).join('');
}

function sortBy(col) {
  if(sortCol===col) sortAsc=!sortAsc; else { sortCol=col; sortAsc=true; }
  renderTable();
}

function getFiltered() {
  const q2=(document.getElementById('search').value||'').toLowerCase();
  const ft=document.getElementById('filter-type').value||'';
  const fa=document.getElementById('filter-agence').value||'';
  const fd=document.getElementById('filter-dest').value||'';
  return allRecords.filter(r=>{
    const mq=!q2||Object.values(r).some(v=>String(v).toLowerCase().includes(q2));
    return mq&&(!ft||r.type===ft)&&(!fa||r.saisie===fa)&&(!fd||r.dest===fd);
  });
}

function renderTable() {
  let filtered=getFiltered();
  filtered.sort((a,b)=>{
    const va=a[sortCol]||''; const vb=b[sortCol]||'';
    return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  });
  const tbody=document.getElementById('table-body');
  if(!filtered.length){
    tbody.innerHTML='<tr><td colspan="8"><div class="empty-state"><i class="ti ti-database"></i>Aucune donnée — les enregistrements des agences apparaissent ici en temps réel</div></td></tr>';
    return;
  }
  tbody.innerHTML=filtered.map(r=>`<tr>
    <td style="font-weight:500">${r.asset}</td>
    <td><span class="badge ${r.type==='Entrée'?'success':'warning'}">${r.type}</span></td>
    <td>${r.date}</td>
    <td><span class="badge info">${r.saisie||'—'}</span></td>
    <td>${r.agence||'—'}</td>
    <td>${r.qs?`<span class="badge ${r.qs==='Oui'?'danger':''}">${r.qs}</span>`:'—'}</td>
    <td>${r.dest&&r.dest!=='—'?`<span class="badge info">${r.dest}</span>`:'—'}</td>
    <td style="color:var(--text-secondary)">${r.note||'—'}</td>
  </tr>`).join('');
}

window.sortBy = sortBy;

function exportCSV(){
  const filtered=getFiltered();
  if(!filtered.length){alert('Aucune donnée à exporter');return;}
  const header=['Asset tag','Type','Date','Agence saisie','Agence provenance','Blocage QS','Destination','Remarque'];
  const rows=filtered.map(r=>[r.asset,r.type,r.date,r.saisie||'',r.agence,r.qs||'',r.dest,r.note]
    .map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  const csv='\uFEFF'+[header.join(','),...rows].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date().toISOString().split('T')[0];
  a.href=url; a.download='journal_central_'+d+'.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
window.exportCSV = exportCSV;

</script>
</body>
</html>
